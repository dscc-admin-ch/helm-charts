{{- if .Values.dashboard.enabled }}
{{- if not .Values.dashboard.streamlitServerSecrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "lomas.dashboard.fullname" . }}
  labels:
    {{- include "lomas.dashboard.labels" . | nindent 4 }}
stringData:
  secrets.toml: |
    [auth]
    client_id = "{{ .Values.dashboard.streamlitServerSecrets.value.auth.clientId }}"
    client_secret = "{{ .Values.dashboard.streamlitServerSecrets.value.auth.clientSecret }}"
    redirect_uri = "{{ .Values.dashboard.streamlitServerSecrets.value.auth.redirectUri }}"
    server_metadata_url = "{{ .Values.dashboard.streamlitServerSecrets.value.auth.serverMetadataUrl }}"
    cookie_secret = "{{ .Values.dashboard.streamlitServerSecrets.value.auth.cookieSecret }}"
    expose_tokens = [{{- range $i, $v := .Values.dashboard.streamlitServerSecrets.value.auth.exposeTokens }}{{ if $i }}, {{ end }}"{{ $v }}"{{- end }}]
{{- end }}
{{- end }}
