{{- if .Values.prometheus.create -}}
apiVersion: v1
kind: ConfigMap
metadata:
{{- $fullname := include "lomas.prometheus.fullname" . }}
  name: {{ printf "%s-prometheus-config" $fullname }}
  labels:
    {{- include "lomas.prometheus.labels" . | nindent 4 }}
data:
  prometheus.yaml: |
    global:
      scrape_interval: {{ .Values.prometheus.config.scrape_interval }}
      evaluation_interval: {{ .Values.prometheus.config.evaluation_interval }}
    scrape_configs:
      - job_name: 'otel-collector'
        static_configs:
          - targets: [ '{{ include "lomas.otel.fullname" . }}:{{ .Values.otel.config.exporters.prometheus.port }}' ]
      - job_name: 'prometheus'
        static_configs:
          - targets: [ '{{ include "lomas.prometheus.fullname" . }}:{{ .Values.prometheus.service.port }}' ]
      - job_name: 'loki'
        static_configs:
          - targets: [ '{{ include "lomas.loki.fullname" .}}:{{ .Values.loki.service.port }}' ]
      - job_name: 'rabbitmq'
        static_configs:
          - targets: [ '{{ .Values.rabbitmq.fullnameOverride}}:{{ .Values.rabbitmq.service.ports.metrics }}' ]
{{- end }}