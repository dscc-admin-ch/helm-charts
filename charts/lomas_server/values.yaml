# General stuff
global:
  imagePullSecrets: []

  configCABundle:
    enabled: false
    name: ""
    key: ""
    filename: ""

nameOverride: ""
fullnameOverride: "lomas"

# Server / Worker
##########################################################################
server:
  image:
    repository: dsccadminch/lomas-raw
    imagePullPolicy: Always
    tag: sha-3642bd3

  initContainers:
    image:
      repository: busybox
      tag: 1.38
    resources: {}

  # Runtime args for server
  runtime_args:
    bootstrap:
      existingSecret: ""
      existingKey: ""
      value: "deadbeef"
    server:
      host_port: "48080"
      root_path: "/"
      log_level: "INFO"
      lomas_log_level: "DEBUG"
      submit_limit: 300
      time_attack:
        method: "jitter" # or "stall"
        magnitude: 1
    authenticator:
      oidc_discovery_url: https://lomas-dex.example.com/.well-known/openid-configuration
      query_userinfo: true
      authentication_type: oidc
    opendp_features: ["contrib", "floating-point", "honest-but-curious"]
    private_db_credentials:
      # - existing_secret: "" # Set this if there is an existing secret.
      # - credentials_name: "s3" # Or set the credentials directly.
      #   db_type: "S3_DB"
      #   access_key_id: "abc"
      #   secret_access_key: "def"
    telemetry:
      enabled: false
      service_name: lomas_server_app
      service_id: default-host

  pvc:
    db: # used for sqlite admin db
      storageClassName: "" # is not set if empty string
      sizeLimit: 500Mi
      sizeRequest: 500Mi
      accessMode: "ReadWriteOnce"
      persistence:
        # If set to "keep", sets the helm/resource-policy of the pvc to keep,
        # so that the pvc is not deleted across reinstalls.
        resourcePolicy: ""
    data: # used for storing data (e.g. csv), mounted to /data at both server and worker.
      enabled: true
      storageClassName: "nas-ssd-encrypt" # is not set if empty string
      sizeLimit: 2Gi
      sizeRequest: 1Gi
      accessMode: "ReadWriteMany"
      persistence:
        # If set to "keep", sets the helm/resource-policy of the pvc to keep,
        # so that the pvc is not deleted across reinstalls.
        resourcePolicy: ""

  service:
    type: ClusterIP
    port: 80
    portName: http

  ingress:
    enabled: false
    className: "nginx"
    annotations:
      nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    hostname: "lomas.example.com"
  # Openshift route for Openshift clusters.
  route:
    enabled: true
    annotations: {}
    hostname: "lomas.example.com"
    tls:
      insecureEdgeTerminationPolicy: Redirect
      termination: edge

  serviceAccount:
    create: false
    annotations: {}
    name: ""
  resources: {}
  podAnnotations: {}
  podSecurityContext: {}
  securityContext: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

worker:
  replicaCount: 1
  resources: {}
  podAnnotations: {}
  podSecurityContext: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}


