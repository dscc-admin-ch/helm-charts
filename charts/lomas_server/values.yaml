# RabbitMQ
##########################################################################
rabbitmq:
  create: true # Added by lomas
  heartbeat_client: 1800 # Added by lomas

  fullnameOverride: "rabbitmq"

  global:
    compatibility:
      openshift:
        adaptSecurityContext: auto
    security:
      allowInsecureImages: true

  image:
    registry: ""
    repository: bitnami/rabbitmq
    tag: 4.0.8-debian-12-r0
    digest: ""
    debug: false
    pullPolicy: IfNotPresent
    pullSecrets: []

  auth:
    username: guest
    password: guest
    securePassword: true
    updatePassword: false
    existingPasswordSecret: ""
    existingSecretPasswordKey: ""
    tls:
      enabled: false

  plugins: "rabbitmq_management rabbitmq_peer_discovery_k8s"

  extraConfiguration: |-
      heartbeat = 1800

  clustering:
    enabled: false

  containerPorts:
    amqp: 5672
    amqpTls: 5671
    dist: 25672
    manager: 15672
    epmd: 4369
    metrics: 9419

  podSecurityContext:
    enabled: true
    fsGroupChangePolicy: Always
    sysctls: []
    supplementalGroups: []
    fsGroup: 1001

  containerSecurityContext:
    enabled: true
    seLinuxOptions: {}
    runAsUser: 1001
    runAsGroup: 1001
    runAsNonRoot: true
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop: ["ALL"]
    seccompProfile:
      type: "RuntimeDefault"

  resourcesPreset: "small"
  resources: {}

  pdb:
    create: false
  serviceAccount:
    create: false
  rbac:
    create: false
  persistence:
    enabled: false
  persistentVolumeClaimRetentionPolicy:
    enabled: false

  service:
    type: ClusterIP
    portEnabled: true
    distPortEnabled: true
    managerPortEnabled: true
    epmdPortEnabled: true
    ports:
      amqp: 5672
      amqpTls: 5671
      dist: 25672
      manager: 15672
      metrics: 9419
      epmd: 4369
    portNames:
      amqp: "amqp"
      amqpTls: "amqp-tls"
      dist: "dist"
      manager: "http-stats"
      metrics: "metrics"
      epmd: "epmd"

  ingress:
    enabled: false

  # Openshift route for Openshift clusters, not part of bitnami chart.
  route:
    enabled: false
    labels: {}
    annotations: {}
    hostname: "example.com"
    tls:
      insecureEdgeTerminationPolicy: None
      termination: edge

  networkPolicy:
    enabled: false

  metrics:
    enabled: false
    plugins: "rabbitmq_prometheus"
    podAnnotations:
      prometheus.io/scrape: "true"
      prometheus.io/port: "{{ .Values.service.ports.metrics }}"


# Dex
##########################################################################


##########################################################################
# ! For demo purposes only !
##########################################################################

dex:
  create: true
  fullnameOverride: "lomas-dex"

  image:
    pullPolicy: "IfNotPresent"
    repository: "ghcr.io/dexidp/dex"
    tag: ""

  imagePullSecrets: []

  ingress:
    enabled: false
    hosts:
      - host: "lomas-dex.example.com"
        paths:
          - path: /
            pathType: Prefix

  route: # Route is implemented by lomas chart.
    enabled: true
    annotations: {}
    hostname: "lomas-dex.example.com"
    tls:
      insecureEdgeTerminationPolicy: Redirect
      termination: edge

  rbac:
    create: false
  serviceAccount:
    create: false
  grpc:
    enabled: true
  service:
    ports:
      http:
        port: 4445
      grpc:
        port: 4446
  config:
    storage:
      type: "memory"
    enablePasswordDB: true
    issuer: https://lomas-dex.example.com
    oauth2:
      passwordConnector: local
    staticClients:
    - id: lomas_client
      name: lomas_client
      public: true
      redirectURIs:
      - /device/callback
    - id: lomas_dashboard
      name: lomas_dashboard
      public: false
      redirectURIs:
      - https://lomas-dashboard.example.com/oauth2callback
      secret: lomas_dashboard
