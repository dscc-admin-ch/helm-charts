  # Openshift route for Openshift clusters.
  route:
    enabled: true
    annotations: {}
    hostname: "lomas-dashboard.example.com"
    tls:
      insecureEdgeTerminationPolicy: Redirect
      termination: edge

  serviceAccount:
    create: false
    annotations: {}
    name: ""
  resources: {}
  podAnnotations: {}
  podSecurityContext: {}
    # fsGroup: 2000
  securityContext: {}
    # capabilities:
    #   drop:
    #   - ALL
    # readOnlyRootFilesystem: true
    # runAsNonRoot: true
    # runAsUser: 1000
  nodeSelector: {}
  tolerations: []
  affinity: {}





# Loki
##########################################################################
loki:
  create: false

  image:
    repository: grafana/loki
    tag: 3.4

  service:
    port: 3100
    target_port: 3100
    type: ClusterIP

  fullnameOverride: "lomas-loki"

  config:
    auth_enabled: false
    limits_config:
      allow_structured_metadata: true
      volume_enabled: true
    common:
      ring:
        instance_addr: 0.0.0.0
        kvstore:
          store: inmemory
      replication_factor: 1
      path_prefix: /tmp/loki
    schema_config:
      configs:
        - from: "2025-01-10"
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: loki_index_
            period: 24h
    storage_config:
      tsdb_shipper:
        active_index_directory: /tmp/loki/index
        cache_location: /tmp/loki/index_cache
      filesystem:
        directory: /tmp/loki/chunks
    pattern_ingester:
      enabled: true

  podSecurityContext: {}
    # fsGroup: 10001 # Match container group rights for volume access
  pvc:
    storageClassName: "" # is not set if empty string
    sizeLimit: 1Gi
    sizeRequest: 1Gi
    persistence:
      # If set to "keep", sets the helm/resource-policy of the pvc to keep,
      # so that the pvc is not deleted across reinstalls.
      resourcePolicy: ""

  resources: {}

# Opentelemetry-Collector
##########################################################################
otel:
  create: false
  image:
    repository: otel/opentelemetry-collector
    tag: 0.119.0
  service:
    type: ClusterIP
    port: 4317
    target_port: 4317
  fullnameOverride: "lomas-otel"
  config:
    processors:
      batch:
        timeout: 5s
    exporters:
      prometheus:
        port: 8889
    extension:
      health_check_port: 13133
      pprof_port: 1777
      zpages_port: 55679
  resources: {}

# Prometheus
##########################################################################
prometheus:
  create: false
  image:
    repository: prom/prometheus
    tag: v3.4.0
  service:
    port: 9091
    target_port: 9091
    type: ClusterIP
  fullnameOverride: "lomas-prometheus"
  config:
    scrape_interval: 5s
    evaluation_interval: 5s
  podSecurityContext: {}
    # fsGroup: 10001 # Match container group rights for volume access
  pvc:
    storageClassName: "" # is not set if empty string
    sizeLimit: 1Gi
    sizeRequest: 1Gi
    persistence:
      # If set to "keep", sets the helm/resource-policy of the pvc to keep,
      # so that the pvc is not deleted across reinstalls.
      resourcePolicy: ""
  resources: {}

# Tempo
##########################################################################
tempo:
  create: false
  image:
    repository: grafana/tempo
    tag: main-2765828
  service:
    type: ClusterIP
    port: 3000
    target_port: 3000

  fullnameOverride: "lomas-tempo"

  config:
    stream_over_http_enabled: true
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: "0.0.0.0:4317"
    storage:
      trace:
        backend: local
        # traces will be stored in <basepath>/traces and wal will be in <basepath>/wal
        basepath: /var/tempo/
  podSecurityContext: {}
    # fsGroup: 10001 # Match container group rights for volume access
  pvc:
    storageClassName: "" # is not set if empty string
    sizeLimit: 1Gi
    sizeRequest: 1Gi
    persistence:
      # If set to "keep", sets the helm/resource-policy of the pvc to keep,
      # so that the pvc is not deleted across reinstalls.
      resourcePolicy: ""
  resources: {}

# Grafana
##########################################################################
grafana:
  create: false

  image:
    repository: grafana/grafana
    tag: 11.0.0

  service:
    type: ClusterIP
    port: 3000
    target_port: 3000

  fullnameOverride: "lomas-grafana-dashboard"

  apiVersion: 1
  datasources:
    prometheus:
      name: Prometheus
      type: prometheus
      uid: prometheus
      access: proxy
      orgId: 1
      basicAuth: false
      isDefault: false
      version: 1
      editable: true
      jsonData:
        httpMethod: GET
    tempo:
      name: Tempo
      type: tempo
      uid: tempo
      access: proxy
      orgId: 1
      basicAuth: false
      isDefault: true
      version: 1
      editable: true
      apiVersion: 1
      stream_over_http_enabled: false
    loki:
      name: Loki
      type: loki
      uid: loki
      access: proxy
      orgId: 1
      basicAuth: false
      isDefault: false
      version: 1
      editable: true
      jsonData:
        httpHeaderName1: "X-Scope-OrgID"
      secureJsonData:
        httpHeaderValue1: "tenant1"

  security:
    admin_user: "admin"
    admin_password: "admin"

  ingress:
    enabled: true
    className: "nginx"
    annotations:
      nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    hostname: "example.com"
  # Openshift route for Openshift clusters.
  route:
    enabled: false
    annotations: {}
    hostname: "example.com"
    tls:
      insecureEdgeTerminationPolicy: Redirect
      termination: edge
  replicaCount: 1
  resources: {}

